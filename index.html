<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NutriO</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap');

  :root {
    --bg: #0f0f13;
    --surface: #1a1a22;
    --surface2: #22222e;
    --accent: #6c63ff;
    --accent2: #ff6584;
    --green: #43e97b;
    --text: #f0f0f5;
    --text2: #8888aa;
    --radius: 16px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Manrope', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  .header {
    padding: 16px 20px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .logo {
    font-size: 22px;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -0.5px;
  }
  .header-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }

  /* TABS */
  .tabs {
    display: flex;
    padding: 12px 20px 0;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    border: none;
    transition: all 0.2s;
    background: var(--surface);
    color: var(--text2);
  }
  .tab.active {
    background: var(--accent);
    color: white;
  }

  /* CONTENT */
  .content { padding: 16px 20px; }
  .page { display: none; }
  .page.active { display: block; }

  /* SCANNER PAGE */
  .scanner-hero {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 32px 20px;
    text-align: center;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }
  .scanner-hero::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 150px; height: 150px;
    background: radial-gradient(circle, rgba(108,99,255,0.3), transparent 70%);
    border-radius: 50%;
  }
  .scanner-icon {
    font-size: 56px;
    margin-bottom: 12px;
    display: block;
  }
  .scanner-hero h2 {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .scanner-hero p {
    font-size: 14px;
    color: var(--text2);
    line-height: 1.5;
  }

  #video-container {
    position: relative;
    border-radius: var(--radius);
    overflow: visible;
    margin-bottom: 16px;
    background: #000;
    display: none;
    min-height: 300px;
    width: 100%;
  }
  /* html5-qrcode вставляет свои элементы — убираем лишние стили */
  #video-container video {
    width: 100% !important;
    border-radius: var(--radius);
  }
  #video-container canvas {
    display: none !important;
  }
  #scanner-video {
    width: 100%;
    display: block;
    border-radius: var(--radius);
  }
  .scan-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .scan-frame {
    width: 220px;
    height: 140px;
    border: 2px solid var(--accent);
    border-radius: 12px;
    box-shadow: 0 0 0 2000px rgba(0,0,0,0.5);
    position: relative;
  }
  .scan-line {
    position: absolute;
    left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    animation: scanline 2s ease-in-out infinite;
  }
  @keyframes scanline {
    0% { top: 0; }
    100% { top: 100%; }
  }

  /* BUTTONS */
  .btn {
    width: 100%;
    padding: 14px;
    border-radius: var(--radius);
    border: none;
    font-family: 'Manrope', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #8b7eff);
    color: white;
  }
  .btn-primary:active { transform: scale(0.97); }
  .btn-secondary {
    background: var(--surface2);
    color: var(--text);
    margin-top: 10px;
  }
  .btn-danger {
    background: rgba(255,101,132,0.15);
    color: var(--accent2);
    margin-top: 10px;
  }

  /* PRODUCT CARD */
  .product-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 16px;
    display: none;
    border: 1px solid rgba(108,99,255,0.3);
  }
  .product-card.show { display: block; }
  .product-name {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 12px;
  }
  .macros-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 16px;
  }
  .macro-item {
    background: var(--surface2);
    border-radius: 10px;
    padding: 10px 6px;
    text-align: center;
  }
  .macro-value {
    font-size: 16px;
    font-weight: 800;
  }
  .macro-label {
    font-size: 10px;
    color: var(--text2);
    margin-top: 2px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .macro-item.cal .macro-value { color: #ff9f43; }
  .macro-item.prot .macro-value { color: #48dbfb; }
  .macro-item.fat .macro-value { color: #ff9ff3; }
  .macro-item.carb .macro-value { color: #54a0ff; }

  .weight-input-block { margin-bottom: 12px; }
  .weight-input-block label {
    font-size: 13px;
    color: var(--text2);
    display: block;
    margin-bottom: 6px;
  }
  .weight-row { display: flex; gap: 8px; }
  .weight-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 12px 14px;
    font-family: 'Manrope', sans-serif;
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    outline: none;
  }
  .weight-input:focus { border-color: var(--accent); }
  .weight-btn {
    background: var(--surface2);
    border: none;
    border-radius: 10px;
    padding: 12px 14px;
    color: var(--text);
    font-size: 18px;
    cursor: pointer;
  }

  .meal-select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 12px 14px;
    font-family: 'Manrope', sans-serif;
    font-size: 14px;
    color: var(--text);
    outline: none;
    margin-bottom: 12px;
    appearance: none;
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--green);
    color: #0f0f13;
    padding: 12px 24px;
    border-radius: 30px;
    font-weight: 700;
    font-size: 14px;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 1000;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* MANUAL INPUT */
  .input-group { margin-bottom: 14px; }
  .input-group label {
    font-size: 13px;
    color: var(--text2);
    display: block;
    margin-bottom: 6px;
    font-weight: 600;
  }
  .text-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 12px 14px;
    font-family: 'Manrope', sans-serif;
    font-size: 15px;
    color: var(--text);
    outline: none;
  }
  .text-input:focus { border-color: var(--accent); }

  /* SECTION TITLE */
  .section-title {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text2);
    margin-bottom: 12px;
  }

  /* STATUS */
  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    margin-bottom: 12px;
  }
  .status-scanning {
    background: rgba(108,99,255,0.2);
    color: var(--accent);
  }
  .status-found {
    background: rgba(67,233,123,0.2);
    color: var(--green);
  }
  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: currentColor;
    animation: pulse 1s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="logo">NutriO</div>
    <div class="header-sub">Умный дневник питания</div>
  </div>
  <span style="font-size:28px">🥗</span>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('scanner')">📦 Штрихкод</button>
  <button class="tab" onclick="switchTab('manual')">✍️ Вручную</button>
  <button class="tab" onclick="switchTab('game')">🎮 Игра</button>
</div>

<div class="content">

  <!-- SCANNER PAGE -->
  <div class="page active" id="page-scanner">

    <div class="scanner-hero" id="scanner-hero">
      <span class="scanner-icon">📦</span>
      <h2>Сканер штрихкодов</h2>
      <p>Наведи камеру на штрихкод упаковки — бот найдёт КБЖУ автоматически</p>
    </div>

    <div id="status-area"></div>
    <div id="video-container">
      <video id="scanner-video" autoplay playsinline muted></video>
      <div class="scan-overlay">
        <div class="scan-frame">
          <div class="scan-line"></div>
        </div>
      </div>
    </div>

    <div class="product-card" id="product-card">
      <div class="product-name" id="product-name">—</div>
      <div class="macros-grid">
        <div class="macro-item cal">
          <div class="macro-value" id="m-cal">—</div>
          <div class="macro-label">ккал</div>
        </div>
        <div class="macro-item prot">
          <div class="macro-value" id="m-prot">—</div>
          <div class="macro-label">белки</div>
        </div>
        <div class="macro-item fat">
          <div class="macro-value" id="m-fat">—</div>
          <div class="macro-label">жиры</div>
        </div>
        <div class="macro-item carb">
          <div class="macro-value" id="m-carb">—</div>
          <div class="macro-label">углев.</div>
        </div>
      </div>
      <div class="weight-input-block">
        <label>Вес порции (граммы)</label>
        <div class="weight-row">
          <button class="weight-btn" onclick="adjustWeight(-10)">−</button>
          <input type="number" class="weight-input" id="weight-input" value="100" min="1" max="2000">
          <button class="weight-btn" onclick="adjustWeight(10)">+</button>
        </div>
      </div>
      <select class="meal-select" id="meal-select-scanner">
        <option value="завтрак">🌅 Завтрак</option>
        <option value="обед">☀️ Обед</option>
        <option value="ужин">🌙 Ужин</option>
        <option value="перекус">🍎 Перекус</option>
      </select>
      <button class="btn btn-primary" onclick="saveProduct()">✅ Записать в дневник</button>
      <button class="btn btn-danger" onclick="resetScanner()">🔄 Сканировать снова</button>
    </div>

    <button class="btn btn-primary" id="scan-btn" onclick="startScanner()">
      📷 Открыть камеру
    </button>
    <button class="btn btn-secondary" id="stop-btn" onclick="stopScanner()" style="display:none">
      ⏹ Остановить
    </button>

  </div>

  <!-- MANUAL PAGE -->
  <div class="page" id="page-manual">
    <div class="section-title">Добавить вручную</div>
    <div class="input-group">
      <label>Название продукта</label>
      <input type="text" class="text-input" id="manual-name" placeholder="Например: Курица">
    </div>
    <div class="input-group">
      <label>Вес (г)</label>
      <input type="number" class="text-input" id="manual-weight" placeholder="200">
    </div>
    <div class="input-group">
      <label>Приём пищи</label>
      <select class="meal-select" id="meal-select-manual">
        <option value="завтрак">🌅 Завтрак</option>
        <option value="обед">☀️ Обед</option>
        <option value="ужин">🌙 Ужин</option>
        <option value="перекус">🍎 Перекус</option>
      </select>
    </div>
    <button class="btn btn-primary" onclick="sendManual()">✅ Добавить</button>
  </div>


  <!-- GAME PAGE -->
  <div class="page" id="page-game">
    <div style="text-align:center; margin-bottom:8px;">
      <span id="game-score-display" style="font-size:15px; font-weight:700; color:var(--text2);">Очки: 0</span>
      &nbsp;&nbsp;
      <span id="game-fat-display" style="font-size:13px; color:var(--text2);">⚖️ 50%</span>
    </div>
    <canvas id="gameCanvas" style="display:block; margin:0 auto; border-radius:12px; touch-action:none;"></canvas>
    <div id="game-controls" style="display:flex; gap:8px; margin-top:10px;">
      <button class="btn btn-secondary" id="btn-left" style="flex:1; padding:18px; font-size:24px; user-select:none;">👈</button>
      <button class="btn btn-secondary" id="btn-right" style="flex:1; padding:18px; font-size:24px; user-select:none;">👉</button>
    </div>
    <p style="text-align:center; font-size:11px; color:var(--text2); margin-top:6px;">Лови 🥦🍎🥕 — худеешь | Избегай 🍕🍔🧁 — толстеешь</p>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

let currentProduct = null;
let stream = null;
let detecting = false;
let animFrame = null;

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('page-' + tab).classList.add('active');
  if (tab !== 'scanner') stopScanner();
}

function showToast(msg, color) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = color || 'var(--green)';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function setStatus(type, text) {
  const area = document.getElementById('status-area');
  if (!text) { area.innerHTML = ''; return; }
  area.innerHTML = `<div class="status-badge status-${type}"><div class="status-dot"></div>${text}</div>`;
}

async function startScanner() {
  if (!('BarcodeDetector' in window)) {
    showToast('Сканер не поддерживается на этом устройстве', 'var(--accent2)');
    return;
  }

  document.getElementById('scan-btn').style.display = 'none';
  document.getElementById('stop-btn').style.display = 'flex';
  document.getElementById('scanner-hero').style.display = 'none';
  document.getElementById('video-container').style.display = 'block';
  document.getElementById('product-card').classList.remove('show');
  setStatus('scanning', 'Ищу штрихкод...');
  detecting = true;

  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
    });

    const video = document.getElementById('scanner-video');
    video.style.display = 'block';
    video.srcObject = stream;
    await video.play();

    const detector = new BarcodeDetector({
      formats: ['ean_13', 'ean_8', 'upc_a', 'upc_e', 'code_128']
    });

    const scan = async () => {
      if (!detecting) return;
      try {
        if (video.readyState >= 2) {
          const barcodes = await detector.detect(video);
          if (barcodes.length > 0) {
            const code = barcodes[0].rawValue;
            detecting = false;
            stopScanner();
            setStatus('scanning', `Штрихкод: ${code} — ищу...`);
            await lookupBarcode(code);
            return;
          }
        }
      } catch(e) {}
      animFrame = setTimeout(scan, 150);
    };

    const startDetecting = () => {
      if (video.readyState >= 2 && video.currentTime > 0) {
        animFrame = requestAnimationFrame(scan);
      } else {
        setTimeout(startDetecting, 100);
      }
    };
    video.addEventListener('playing', startDetecting, { once: true });
    // На случай если 'playing' уже было
    if (!video.paused) startDetecting();

  } catch(e) {
    showToast('Нет доступа к камере', 'var(--accent2)');
    resetScanner();
  }
}

function stopScanner() {
  detecting = false;
  if (animFrame) { clearTimeout(animFrame); animFrame = null; }
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  const video = document.getElementById('scanner-video');
  video.srcObject = null;
  document.getElementById('video-container').style.display = 'none';
  document.getElementById('scan-btn').style.display = 'flex';
  document.getElementById('stop-btn').style.display = 'none';
  document.getElementById('scanner-hero').style.display = 'block';
  setStatus(null);
}

async function lookupBarcode(code) {
  setStatus('scanning', `🔍 Ищу в базах данных...`);

  let product = await tryOpenFoodFacts(code);
  if (!product) product = await tryUPCItemDB(code);

  if (!product) {
    setStatus('scanning', `Штрихкод ${code} не найден 😔`);
    document.getElementById('scan-btn').style.display = 'flex';
    document.getElementById('stop-btn').style.display = 'none';
    return;
  }

  currentProduct = product;
  document.getElementById('product-name').textContent = currentProduct.name;
  document.getElementById('m-cal').textContent = currentProduct.cal;
  document.getElementById('m-prot').textContent = currentProduct.prot;
  document.getElementById('m-fat').textContent = currentProduct.fat;
  document.getElementById('m-carb').textContent = currentProduct.carb;
  document.getElementById('product-card').classList.add('show');
  document.getElementById('video-container').style.display = 'none';
  document.getElementById('stop-btn').style.display = 'none';
  setStatus('found', `Найдено: ${currentProduct.name}`);
}

function parseOFFProduct(data) {
  if (data.status !== 1) return null;
  const p = data.product;
  const n = p.nutriments || {};
  const name = p.product_name_ru || p.product_name_en || p.product_name || '';
  if (!name) return null;
  let cal = n['energy-kcal_100g'] || (n['energy_100g'] ? n['energy_100g'] / 4.184 : 0);
  return {
    name: name.trim(),
    cal: Math.round(cal),
    prot: Math.round((n['proteins_100g'] || 0) * 10) / 10,
    fat: Math.round((n['fat_100g'] || 0) * 10) / 10,
    carb: Math.round((n['carbohydrates_100g'] || 0) * 10) / 10,
  };
}

async function tryOpenFoodFacts(code) {
  // Сначала русский сервер — больше РФ/СНГ продуктов
  const urls = [
    `https://ru.openfoodfacts.org/api/v0/product/${code}.json`,
    `https://world.openfoodfacts.org/api/v0/product/${code}.json`,
  ];
  for (const url of urls) {
    try {
      const res = await fetch(url);
      const data = await res.json();
      const product = parseOFFProduct(data);
      if (product) return product;
    } catch(e) {}
  }
  return null;
}

async function tryUPCItemDB(code) {
  try {
    const res = await fetch(`https://api.upcitemdb.com/prod/trial/lookup?upc=${code}`);
    const data = await res.json();
    if (data.code !== 'OK' || !data.items?.length) return null;
    const item = data.items[0];
    const name = item.title || item.brand || '';
    if (!name) return null;
    // UPCItemDB не всегда даёт КБЖУ — ставим 0, юзер сам введёт
    const n = item.nutrition || {};
    return {
      name: name.trim(),
      cal: Math.round(n.calories || 0),
      prot: Math.round((n.protein || 0) * 10) / 10,
      fat: Math.round((n.fat || 0) * 10) / 10,
      carb: Math.round((n.carbohydrate || 0) * 10) / 10,
    };
  } catch(e) { return null; }
}

function adjustWeight(delta) {
  const inp = document.getElementById('weight-input');
  inp.value = Math.max(1, parseInt(inp.value || 100) + delta);
}

function saveProduct() {
  if (!currentProduct) return;
  const weight = parseInt(document.getElementById('weight-input').value) || 100;
  const meal = document.getElementById('meal-select-scanner').value;
  const ratio = weight / 100;

  // Если КБЖУ известно — сохраняем напрямую, иначе отдаём боту на расчёт через AI
  const hasNutrition = currentProduct.cal > 0;
  const data = hasNutrition ? {
    action: 'add_food',
    food_name: currentProduct.name,
    meal_type: meal,
    weight: weight,
    calories: Math.round(currentProduct.cal * ratio * 10) / 10,
    protein: Math.round(currentProduct.prot * ratio * 10) / 10,
    fat: Math.round(currentProduct.fat * ratio * 10) / 10,
    carbs: Math.round(currentProduct.carb * ratio * 10) / 10,
  } : {
    action: 'add_manual',
    food_name: currentProduct.name,
    meal_type: meal,
    weight: weight,
  };

  try {
    if (tg && tg.sendData) {
      tg.sendData(JSON.stringify(data));
    } else {
      showToast(`✅ ${currentProduct.name} ${weight}г записан!`);
    }
  } catch(e) {
    showToast('Ошибка отправки: ' + e.message, 'var(--accent2)');
  }
}

function resetScanner() {
  currentProduct = null;
  document.getElementById('product-card').classList.remove('show');
  startScanner();
}

function sendManual() {
  const name = document.getElementById('manual-name').value.trim();
  const weight = document.getElementById('manual-weight').value;
  const meal = document.getElementById('meal-select-manual').value;
  if (!name || !weight) { showToast('Заполни название и вес', 'var(--accent2)'); return; }
  const data = { action: 'add_manual', food_name: name, meal_type: meal, weight: parseInt(weight) };
  if (tg) { tg.sendData(JSON.stringify(data)); }
  else { showToast(`✅ ${name} ${weight}г добавлен!`); }
}

// ============================================================
// PIXEL UTILS
// ============================================================
function px(ctx,x,y,c,s=PX){ctx.fillStyle=c;ctx.fillRect(Math.round(x),Math.round(y),s,s);}
function pxRect(ctx,x,y,w,h,fill,stroke=null){
  ctx.fillStyle=fill;ctx.fillRect(x,y,w,h);
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=PX;ctx.strokeRect(x+PX/2,y+PX/2,w-PX,h-PX);}
}
function pxText(ctx,t,x,y,c,sz=12,align='center'){
  ctx.fillStyle=c;ctx.font=`bold ${sz}px monospace`;ctx.textAlign=align;ctx.fillText(t,x,y);
}
function pxBtn(ctx,x,y,w,h,text,bg='#6c63ff',fg='#fff',sz=11){
  pxRect(ctx,x,y,w,h,bg,'#ffffff22');
  pxText(ctx,text,x+w/2,y+h/2+sz*0.38,fg,sz);
}

// ============================================================
// РИСУЕМ ПЕРСОНАЖА
// ============================================================
function drawPlayerAt(ctx,cx,py,fat,gender,skin,frame=0,moveL=false,moveR=false,shield=0,magnet=0,W=400,double_=0){
  const fatN=Math.min(fat/100,1);
  const isFemale=gender==='female';

  // Размеры масштабируются с жиром
  const bodyBaseW=isFemale?8:9;
  const bodyW=Math.round((bodyBaseW+fatN*9)*PX);
  const headS=8*PX, legH=7*PX;

  // Девушка: узкие плечи, чуть шире бёдра ТОЛЬКО при наборе жира
  const shoulderW=isFemale ? bodyW*(0.72+fatN*0.18) : bodyW;
  const hipW=     isFemale ? bodyW*(0.78+fatN*0.28) : bodyW*0.9;
  const bodyH=Math.round((6+fatN*4)*PX);

  const bodyY=py-bodyH-legH;
  const headY=bodyY-headS;
  const headX=Math.round(cx-headS/2);
  const moving=moveL||moveR;
  const legA=Math.sin(frame*0.22)*3*(moving?1:0);

  // Эффекты бонусов
  if(shield>0){
    ctx.strokeStyle=`rgba(100,150,255,${0.35+Math.sin(frame*0.15)*0.3})`;
    ctx.lineWidth=PX*2;ctx.beginPath();
    ctx.ellipse(cx,bodyY+bodyH/2,bodyW+PX*5,bodyH+headS+PX*5,0,0,Math.PI*2);ctx.stroke();
  }
  if(magnet>0){
    ctx.strokeStyle='rgba(34,170,255,0.12)';ctx.lineWidth=PX;ctx.beginPath();
    ctx.arc(cx,bodyY,W*0.22,0,Math.PI*2);ctx.stroke();
  }
  if(double_>0){
    ctx.strokeStyle=`rgba(255,238,0,${0.2+Math.sin(frame*0.2)*0.15})`;ctx.lineWidth=PX*1.5;
    ctx.beginPath();ctx.arc(cx,bodyY+bodyH/2,bodyW+PX*7,0,Math.PI*2);ctx.stroke();
  }

  // Тень
  ctx.fillStyle='rgba(0,0,0,0.22)';ctx.beginPath();
  ctx.ellipse(cx,py+2,bodyW*0.5,4,0,0,Math.PI*2);ctx.fill();

  // ===== НОГИ =====
  const lw=4*PX, ly=bodyY+bodyH;
  if(isFemale){
    // Юбка — ширина зависит от жира
    const skirtFlare=0.55+fatN*0.45;
    ctx.beginPath();
    ctx.moveTo(cx-hipW*0.52,ly-PX*2);
    ctx.lineTo(cx+hipW*0.52,ly-PX*2);
    ctx.lineTo(cx+hipW*skirtFlare,ly+legH*0.65);
    ctx.lineTo(cx-hipW*skirtFlare,ly+legH*0.65);
    ctx.closePath(); ctx.fillStyle=skin.pants; ctx.fill();
    ctx.strokeStyle='#1a1a2e22'; ctx.lineWidth=1; ctx.stroke();
    // Декоративная полоска на юбке
    ctx.fillStyle=skin.pants+'66';
    ctx.fillRect(cx-hipW*0.45,ly+PX*2,hipW*0.9,PX*2);
    // Ноги
    pxRect(ctx,Math.round(cx-lw*1.1),ly+legH*0.6,lw,legH*0.42,skin.skin);
    pxRect(ctx,Math.round(cx+lw*0.1), ly+legH*0.6,lw,legH*0.42,skin.skin);
    // Обувь
    pxRect(ctx,Math.round(cx-lw*1.2),ly+legH,lw+PX*2,PX*3,skin.boot);
    pxRect(ctx,Math.round(cx+lw*0.0), ly+legH,lw+PX*2,PX*3,skin.boot);
  } else {
    pxRect(ctx,Math.round(cx-bodyW*0.3-lw/2),ly+legA,  lw,legH-legA,skin.pants);
    pxRect(ctx,Math.round(cx-bodyW*0.3-lw/2),ly+legH,  lw,PX*2,     skin.boot);
    pxRect(ctx,Math.round(cx+bodyW*0.3-lw/2),ly-legA,  lw,legH+legA,skin.pants);
    pxRect(ctx,Math.round(cx+bodyW*0.3-lw/2),ly+legH,  lw,PX*2,     skin.boot);
  }

  // ===== ТЕЛО =====
  if(isFemale){
    // Трапеция
    ctx.beginPath();
    ctx.moveTo(cx-shoulderW*0.5,bodyY);
    ctx.lineTo(cx+shoulderW*0.5,bodyY);
    ctx.lineTo(cx+hipW*0.5,     bodyY+bodyH);
    ctx.lineTo(cx-hipW*0.5,     bodyY+bodyH);
    ctx.closePath();
    ctx.fillStyle=skin.shirt; ctx.fill();
    ctx.strokeStyle='#1a1a2e'; ctx.lineWidth=PX*0.7; ctx.stroke();
    // Блик
    ctx.fillStyle=skin.shirtH+'44';
    ctx.beginPath();
    ctx.moveTo(cx-shoulderW*0.38,bodyY+PX);
    ctx.lineTo(cx-shoulderW*0.38+PX*2,bodyY+PX);
    ctx.lineTo(cx-hipW*0.3+PX*2,bodyY+bodyH-PX);
    ctx.lineTo(cx-hipW*0.3,bodyY+bodyH-PX);
    ctx.closePath(); ctx.fill();
  } else {
    pxRect(ctx,Math.round(cx-shoulderW/2),bodyY,shoulderW,bodyH,skin.shirt,'#1a1a2e');
    pxRect(ctx,Math.round(cx-shoulderW/2)+PX,bodyY+PX,PX*2,bodyH-PX*2,skin.shirtH+'44');
    pxRect(ctx,Math.round(cx-shoulderW/2),bodyY+bodyH-PX*3,shoulderW,PX*3,'#1a1a2e');
    pxRect(ctx,Math.round(cx-PX*1.5),bodyY+bodyH-PX*3,PX*3,PX*3,'#ddaa22');
  }

  // ===== РУКИ =====
  const aW=3*PX, aH=isFemale?3*PX:5*PX, aY=bodyY+PX*2;
  const aS=Math.sin(frame*0.22)*4*(moving?1:0);
  const lAx=Math.round(cx-shoulderW/2)-aW;
  const rAx=Math.round(cx+shoulderW/2);
  pxRect(ctx,lAx,aY+aS, aW,aH,skin.skin,'#1a1a2e');
  pxRect(ctx,rAx,aY-aS,aW,aH,skin.skin,'#1a1a2e');

  // ===== ГОЛОВА =====
  pxRect(ctx,headX,headY,headS,headS,skin.skin,'#1a1a2e');
  // Щёки
  ctx.fillStyle=skin.skinD+'66';
  ctx.fillRect(headX+PX,headY+PX*3,PX*2,PX*2);
  ctx.fillRect(headX+PX*5,headY+PX*3,PX*2,PX*2);

  // ===== ВОЛОСЫ =====
  pxRect(ctx,headX,headY,headS,PX*2,skin.hair);
  // Блик на волосах
  px(ctx,headX+PX,headY,skin.hairH,PX);px(ctx,headX+PX*3,headY,skin.hairH,PX);
  if(isFemale){
    // Длинные локоны по бокам
    pxRect(ctx,headX-PX,headY+PX,PX*2,headS*0.88,skin.hair);
    pxRect(ctx,headX+headS-PX,headY+PX,PX*2,headS*0.82,skin.hair);
    // Хвост
    pxRect(ctx,headX+headS,headY+PX*2,PX*2,headS*0.55,skin.hair);
    px(ctx,headX+headS+PX,headY+PX*3,skin.hairH,PX);
  } else {
    pxRect(ctx,headX,headY,PX*2,headS*0.55,skin.hair);
  }

  // ===== ГОЛОВНОЙ УБОР =====
  if(skin.hat){
    const hx=headX, hy=headY;
    if(S.hat===1){ // Кепка/Ободок для мужика — кепка
      pxRect(ctx,hx-PX,hy-PX*3,headS+PX*2,PX*3,skin.hat,'#1a1a2e');
      pxRect(ctx,hx+headS,hy-PX,PX*5,PX*2,skin.hat); // козырёк
      px(ctx,hx+PX,hy-PX*3,skin.hatH,PX); // блик
    } else if(S.hat===2){ // Шапка
      pxRect(ctx,hx,hy-PX*5,headS,PX*5,skin.hat,'#1a1a2e');
      pxRect(ctx,hx-PX,hy-PX*2,headS+PX*2,PX*2,skin.hat);
      px(ctx,hx+PX*2,hy-PX*4,skin.hatH,PX*3);
    } else if(S.hat===3){ // Шляпа
      pxRect(ctx,hx-PX*2,hy-PX,headS+PX*4,PX*2,skin.hat,'#1a1a2e'); // поля
      pxRect(ctx,hx+PX,hy-PX*6,headS-PX*2,PX*5,skin.hat,'#1a1a2e'); // тулья
      px(ctx,hx+PX*3,hy-PX*5,skin.hatH,PX); // блик
    } else if(S.hat===4){ // Капюшон/Берет
      ctx.beginPath();ctx.ellipse(cx,hy-PX*2,headS*0.55,PX*5,0,0,Math.PI*2);
      ctx.fillStyle=skin.hat;ctx.fill();
      ctx.strokeStyle='#1a1a2e';ctx.lineWidth=PX*0.7;ctx.stroke();
    } else if(S.hat===5){ // Берет/Диадема
      if(isFemale){ // Диадема
        for(let i=0;i<5;i++) px(ctx,hx+PX*i*1.5,hy-PX*3,skin.hat,PX*2);
        px(ctx,hx+PX*3,hy-PX*5,skin.hatH,PX*2); // центральный камень
      } else { // Берет
        ctx.beginPath();ctx.ellipse(cx+PX*2,hy-PX*3,headS*0.6,PX*4,0.3,0,Math.PI*2);
        ctx.fillStyle=skin.hat;ctx.fill();ctx.strokeStyle='#1a1a2e';ctx.lineWidth=1;ctx.stroke();
      }
    }
    // Женские шляпки (отдельная логика)
    if(isFemale){
      if(S.hat===1){ // Ободок
        pxRect(ctx,hx,hy-PX,headS,PX*2,skin.hat);
        // Цветочек
        px(ctx,hx+PX*2,hy-PX*2,'#ff88aa',PX*2);px(ctx,hx+PX*4,hy-PX*3,'#ff88aa',PX);
      } else if(S.hat===2){ // Берет
        ctx.beginPath();ctx.ellipse(cx-PX,hy-PX*3,headS*0.55,PX*4,-0.2,0,Math.PI*2);
        ctx.fillStyle=skin.hat;ctx.fill();ctx.strokeStyle='#1a1a2e';ctx.lineWidth=1;ctx.stroke();
      } else if(S.hat===3){ // Бантик
        // Левое крыло
        ctx.beginPath();ctx.ellipse(cx-PX*4,hy-PX*4,PX*4,PX*3,-0.5,0,Math.PI*2);
        ctx.fillStyle=skin.hat;ctx.fill();ctx.strokeStyle='#1a1a2e';ctx.lineWidth=1;ctx.stroke();
        // Правое крыло
        ctx.beginPath();ctx.ellipse(cx+PX*4,hy-PX*4,PX*4,PX*3,0.5,0,Math.PI*2);
        ctx.fillStyle=skin.hat;ctx.fill();ctx.stroke();
        // Центр
        px(ctx,cx-PX,hy-PX*5,skin.hatH,PX*2);
      } else if(S.hat===4){ // Шляпка
        pxRect(ctx,hx-PX*3,hy,headS+PX*6,PX*2,skin.hat,'#1a1a2e');
        pxRect(ctx,hx+PX,hy-PX*5,headS-PX*2,PX*5,skin.hat,'#1a1a2e');
        // Лента
        pxRect(ctx,hx+PX,hy-PX,headS-PX*2,PX*2,skin.hatH);
      }
    }
  }

  // ===== ГЛАЗА =====
  const eY=headY+PX*3, eShift=moveR?PX:(moveL?-PX:0);
  pxRect(ctx,headX+PX*2-1,eY-1,PX*2+2,PX*2+2,'#fffde8');
  pxRect(ctx,headX+PX*5-1,eY-1,PX*2+2,PX*2+2,'#fffde8');
  px(ctx,headX+PX*2+eShift,eY,'#1a1a1a',PX*2);
  px(ctx,headX+PX*5+eShift,eY,'#1a1a1a',PX*2);
  px(ctx,headX+PX*2+eShift,eY,'#ffffffaa',PX);
  px(ctx,headX+PX*5+eShift,eY,'#ffffffaa',PX);
  if(isFemale){
    // Длинные ресницы
    px(ctx,headX+PX*2-PX,eY-PX*2,skin.hair,PX);
    px(ctx,headX+PX*2,   eY-PX*2,skin.hair,PX);
    px(ctx,headX+PX*2+PX,eY-PX*2,skin.hair,PX);
    px(ctx,headX+PX*2+PX*2,eY-PX,skin.hair,PX);
    px(ctx,headX+PX*5-PX,eY-PX*2,skin.hair,PX);
    px(ctx,headX+PX*5,   eY-PX*2,skin.hair,PX);
    px(ctx,headX+PX*5+PX,eY-PX*2,skin.hair,PX);
    px(ctx,headX+PX*5+PX*2,eY-PX,skin.hair,PX);
    // Помада
    px(ctx,headX+PX*3,headY+PX*6,'#ff3377',PX*2);
  }

  // ===== РОТ =====
  const mY=headY+PX*5;
  if(fatN<0.6){px(ctx,headX+PX*2,mY+PX,'#333',PX);px(ctx,headX+PX*3,mY+PX*2,'#333',PX);px(ctx,headX+PX*4,mY+PX*2,'#333',PX);px(ctx,headX+PX*5,mY+PX,'#333',PX);}
  else if(fatN<0.82){px(ctx,headX+PX*2,mY+PX*2,'#333',PX*4);}
  else{px(ctx,headX+PX*2,mY+PX*2,'#333',PX);px(ctx,headX+PX*3,mY+PX,'#333',PX);px(ctx,headX+PX*4,mY+PX,'#333',PX);px(ctx,headX+PX*5,mY+PX*2,'#333',PX);}
  if(fatN>0.7){px(ctx,headX+headS+PX,headY+PX*3,'#44aaff',PX);px(ctx,headX+headS+PX,headY+PX*5,'#44aaff',PX);}
}

function drawBGFull(ctx,gs,bgIdx){
  const bg=BACKGROUNDS[bgIdx],{W,H}=gs;
  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,bg.sky[0]);grad.addColorStop(1,bg.sky[1]);
  ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);
  if(bg.starField&&gs.bgStars) gs.bgStars.forEach(s=>{
    const t=Math.sin((gs.frame||0)*0.05+s.blink)*0.5+0.5;
    ctx.fillStyle=`rgba(200,220,255,${0.3+t*0.7})`;ctx.fillRect(s.x,s.y,s.s,s.s);
  });
  if(bg.sunset){
    ctx.fillStyle='#ff880099';ctx.beginPath();ctx.arc(W*0.75,H*0.2,30,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ff440033';ctx.beginPath();ctx.arc(W*0.75,H*0.2,48,0,Math.PI*2);ctx.fill();
  }
  if(bg.dungeon){
    for(let y=0;y<H-30;y+=PX*6){
      const off=(Math.floor(y/(PX*6))%2)*PX*5;
      for(let x=-off;x<W;x+=PX*10){ctx.strokeStyle='#1a1a1a44';ctx.lineWidth=1;ctx.strokeRect(x,y,PX*10,PX*6);}
    }
    [W*0.12,W*0.88].forEach(tx=>{ctx.font='15px serif';ctx.textAlign='center';ctx.fillText('🔥',tx,H*0.25+Math.sin((gs.frame||0)*0.12)*2);});
  }
  if(bg.trees){
    [0.08,0.22,0.78,0.92].forEach(tx=>{
      ctx.fillStyle='#0a1a0a';ctx.fillRect(W*tx-4,H-90,8,60);
      ctx.beginPath();ctx.arc(W*tx,H-92,24,0,Math.PI*2);ctx.fill();
    });
  }
  const gy=H-30;
  for(let x=0;x<W;x+=PX*2){px(ctx,x,gy,bg.ground,PX*2);px(ctx,x,gy+PX*2,bg.ground,PX*2);}
  for(let x=0;x<W;x+=PX*4)px(ctx,x,gy-PX,bg.grass,PX*2);

  // Детокс-раунд — зелёный оверлей
  if(gs&&gs.detoxRound){
    ctx.fillStyle=`rgba(0,200,80,${0.06+Math.sin((gs.frame||0)*0.1)*0.03})`;
    ctx.fillRect(0,0,W,H);
    pxText(ctx,'🍃 ДЕТОКС-РАУНД!',W/2,50,'#44ff88',12);
  }
}

function drawBGPreview(ctx,x,y,w,h,bgIdx){
  const bg=BACKGROUNDS[bgIdx];
  const grad=ctx.createLinearGradient(x,y,x,y+h);
  grad.addColorStop(0,bg.sky[0]);grad.addColorStop(1,bg.sky[1]);
  ctx.fillStyle=grad;ctx.fillRect(x,y,w,h);
  if(bg.starField){for(let i=0;i<14;i++)px(ctx,x+Math.random()*w,y+Math.random()*h*0.75,'#ffffffbb',1);}
  if(bg.sunset){ctx.fillStyle='#ff9900bb';ctx.beginPath();ctx.arc(x+w*0.75,y+h*0.25,7,0,Math.PI*2);ctx.fill();}
  if(bg.trees){ctx.fillStyle='#0a1a0a';ctx.fillRect(x+w*0.2-2,y+h-14,4,10);ctx.beginPath();ctx.arc(x+w*0.2,y+h-16,7,0,Math.PI*2);ctx.fill();}
  if(bg.dungeon){for(let dy=0;dy<h;dy+=6){ctx.strokeStyle='#33333366';ctx.lineWidth=1;ctx.strokeRect(x,y+dy,w,6);}}
  ctx.fillStyle=bg.ground;ctx.fillRect(x,y+h-7,w,7);
  ctx.fillStyle=bg.grass;ctx.fillRect(x,y+h-9,w,3);
}

// УМНЫЙ СПАВН
// ============================================================
function spawnFood(){
  const gs=GS;
  const diff=DIFFICULTY[S.diff];
  const maxOnScreen=Math.min(diff.maxItems,2+Math.floor(gs.wave*0.7));
  if(gs.foods.length>=maxOnScreen)return;

  const LANES=4, laneW=gs.W/LANES;
  const available=[];
  for(let i=0;i<LANES;i++){
    if(gs.frame-laneLastSpawn[i]<diff.laneCool)continue;
    const lx=laneW*(i+0.5);
    const blocked=gs.foods.some(f=>Math.abs(f.x-lx)<55&&f.y<gs.H*0.3);
    if(!blocked)available.push(i);
  }
  if(available.length===0)return;

  const lane=available[Math.floor(Math.random()*available.length)];
  laneLastSpawn[lane]=gs.frame;
  const lx=laneW*(lane+0.5)+(Math.random()-0.5)*laneW*0.22;

  let pool,isJunk=false,isPowerup=false,isRare=false;
  const roll=Math.random();
  if(gs.detoxRound){
    pool=FOOD_ITEMS.healthy;
  } else if(roll<0.07&&gs.score>30){
    pool=FOOD_ITEMS.powerup;isPowerup=true;
  } else if(roll<0.10&&gs.score>100){
    // Легендарный предмет
    pool=FOOD_ITEMS.healthy.filter(f=>f.rare);isRare=true;
  } else if(roll<0.44){
    pool=FOOD_ITEMS.junk;isJunk=true;
  } else {
    pool=FOOD_ITEMS.healthy.filter(f=>!f.rare);
  }
  const item=pool[Math.floor(Math.random()*pool.length)];
  gs.foods.push({
    x:lx,y:-34,size:30,
    speed:gs.speed*(0.78+Math.random()*0.44),
    ...item,isJunk,isPowerup,rare:isRare,
    wobble:Math.random()*Math.PI*2,
    wobbleSpeed:(Math.random()-0.5)*0.022,
  });
}

function initGame(){
  const canvas=document.getElementById('gameCanvas');
  if(!canvas)return;
  if(GS&&GS.raf){cancelAnimationFrame(GS.raf);GS.raf=null;}
  const pw=canvas.parentElement.clientWidth-24;
  const W=Math.min(pw,400),H=Math.round(W*1.44);
  canvas.width=W;canvas.height=H;
  canvas.style.width=W+'px';canvas.style.height=H+'px';
  const diff=DIFFICULTY[S.diff];
  laneLastSpawn=[0,0,0,0];
  GS={
    canvas,ctx:canvas.getContext('2d'),W,H,
    score:0,combo:0,maxCombo:0,fat:50,lives:5,
    frame:0,wave:1,speed:diff.baseSpeed,
    over:false,started:false,detoxRound:false,
    player:{x:W/2,y:H-32,w:16*PX,moveL:false,moveR:false},
    foods:[],effects:[],particles:[],
    magnet:0,shield:0,double:0,
    flashColor:null,flashA:0,raf:null,
    bgStars:Array.from({length:32},()=>({x:Math.random()*W,y:Math.random()*H,s:Math.random()<0.5?1:2,blink:Math.random()*60})),
  };
  ['btn-left','btn-right'].forEach((id,side)=>{
    const el=document.getElementById(id);if(!el)return;
    const on=(evs,fn)=>evs.forEach(e=>el.addEventListener(e,fn,{passive:false}));
    on(['touchstart','mousedown'],e=>{e.preventDefault();if(side===0)GS.player.moveL=true;else GS.player.moveR=true;});
    on(['touchend','mouseup','mouseleave'],e=>{e.preventDefault();if(side===0)GS.player.moveL=false;else GS.player.moveR=false;});
  });
  document.addEventListener('keydown',e=>{if(!GS)return;if(e.key==='ArrowLeft'||e.key==='a')GS.player.moveL=true;if(e.key==='ArrowRight'||e.key==='d')GS.player.moveR=true;});
  document.addEventListener('keyup',e=>{if(!GS)return;if(e.key==='ArrowLeft'||e.key==='a')GS.player.moveL=false;if(e.key==='ArrowRight'||e.key==='d')GS.player.moveR=false;});
  canvas.addEventListener('click',e=>{
    const r=canvas.getBoundingClientRect();
    handleClick((e.clientX-r.left)*(GS.W/r.width),(e.clientY-r.top)*(GS.H/r.height));
  });
  SCREEN=S.gender?'start':'gender';
  gameLoop();
}

function handleClick(cx,cy){
  const{W,H}=GS;
  if(SCREEN==='gender'){S.gender=cx<W/2?'male':'female';STORE.set('gender',S.gender);SCREEN='start';return;}
  if(SCREEN==='start'){
    if(cy>H*0.82&&cy<H*0.82+36){SCREEN='game';GS.started=true;return;}
    if(cy>H*0.90&&cy<H*0.90+26){SCREEN='settings';return;}
    return;
  }
  if(SCREEN==='settings'){
    // Главные табы
    [['bg',0],['char',1],['diff',2]].forEach(([t,i])=>{
      const bx=W*0.04+i*(W*0.32),by=36,bw=W*0.29;
      if(cx>bx&&cx<bx+bw&&cy>by&&cy<by+22)settingsTab=t;
    });
    if(settingsTab==='bg'){
      const pw=Math.round(W*0.42),ph=50,gap=8,ox=(W-pw*2-gap)/2;
      BACKGROUNDS.forEach((bg,i)=>{
        const col=i%2,row=Math.floor(i/2),bx=ox+col*(pw+gap),by=86+row*(ph+26);
        if(cx>bx&&cx<bx+pw&&cy>by&&cy<by+ph+20){S.bg=i;STORE.set('bg',i);}
      });
    }
    if(settingsTab==='char'){
      const g=S.gender||'male';
      // Смена пола
      if(cy>70&&cy<90){
        const ng=cx<W*0.62?'male':'female';
        if(ng!==S.gender){S.gender=ng;STORE.set('gender',S.gender);S.hat=S.hair=S.shirt=S.pants=S.boot=0;['hat','hair','shirt','pants','boot'].forEach(k=>STORE.set(k,0));}
      }
      // Стрелки навигации частей
      const navY=H*0.44;
      if(cy>navY&&cy<navY+22){
        if(cx>W*0.48-26&&cx<W*0.48){charPart=(charPart+4)%5;}
        if(cx>W*0.48+W*0.40&&cx<W*0.48+W*0.40+24){charPart=(charPart+1)%5;}
      }
      // Свотчи
      const pool=getPartPool(g,charPart);
      const swW=Math.round(W*0.12),swH=18,swGap=4,swTotalW=3*(swW+swGap)-swGap;
      const swOx=W*0.48+(W*0.48-swTotalW)/2;
      pool.forEach((part,i)=>{
        const col=i%3,row=Math.floor(i/3),bx=swOx+col*(swW+swGap),by=H*0.52+row*(swH+swGap+14);
        if(cx>bx&&cx<bx+swW&&cy>by&&cy<by+swH){
          const key=getPartKey(charPart);S[key]=i;STORE.set(key,i);
        }
      });
    }
    if(settingsTab==='diff'){
      DIFFICULTY.forEach((d,i)=>{const by=88+i*66;if(cy>by&&cy<by+58){S.diff=i;STORE.set('diff',i);}});
    }
    if(cy>H-52&&cy<H-18&&cx>W/2-55&&cx<W/2+55)SCREEN='start';
    return;
  }
  if(SCREEN==='game'){if(cx>GS.W-30&&cy<30){SCREEN='settings';return;}return;}
  if(SCREEN==='over'){
    if(cy>H*0.67&&cy<H*0.67+36)restartGame();
    else if(cy>H*0.77&&cy<H*0.77+28)SCREEN='start';
    return;
  }
}

function restartGame(){
  const diff=DIFFICULTY[S.diff];
  laneLastSpawn=[0,0,0,0];
  Object.assign(GS,{score:0,combo:0,maxCombo:0,fat:50,lives:5,frame:0,wave:1,
    speed:diff.baseSpeed,over:false,started:true,detoxRound:false,
    foods:[],effects:[],particles:[],magnet:0,shield:0,double:0,flashA:0});
  SCREEN='game';
}

// ============================================================
// ГЛАВНЫЙ ЦИКЛ
// ============================================================
function gameLoop(){
  const gs=GS;if(!gs)return;
  gs.raf=requestAnimationFrame(gameLoop);
  const{ctx,W,H}=gs;
  const skin=getSkin();
  const gender=S.gender||'male';

  drawBGFull(ctx,gs,S.bg);

  if(SCREEN==='gender'){drawPlayerAt(ctx,W/2,H-65,20,gender,skin,gs.frame);gs.frame++;drawGender(ctx,W,H);return;}
  if(SCREEN==='start'){drawPlayerAt(ctx,W/2,H-65,20,gender,skin,gs.frame);gs.frame++;drawStart(ctx,W,H);return;}
  if(SCREEN==='settings'){drawSettings(ctx,W,H);return;}

  const GRACE=300;
  if(SCREEN==='game'&&!gs.over){
    gs.frame++;
    const p=gs.player,spd=W*0.016;
    if(p.moveL)p.x=Math.max(p.w/2,p.x-spd);
    if(p.moveR)p.x=Math.min(W-p.w/2,p.x+spd);
    if(gs.magnet>0)gs.magnet--;
    if(gs.shield>0)gs.shield--;
    if(gs.double>0)gs.double--;

    const diff=DIFFICULTY[S.diff];
    const newWave=Math.floor(gs.score/diff.wavePts)+1;
    if(newWave>gs.wave){
      gs.wave=newWave;gs.speed+=diff.speedInc;
      // Детокс каждую 4-ю волну
      gs.detoxRound=(gs.wave%4===0);
      gs.effects.push({x:W/2,y:H*0.45,text:gs.detoxRound?'🍃 ДЕТОКС-РАУНД!':'ВОЛНА '+gs.wave+'!',color:gs.detoxRound?'#44ff88':'#ffe066',vy:-0.7,a:1,size:15});
      spawnParticles(W/2,H/2,gs.detoxRound?'#44ff44':'#6c63ff',14);
      // Бонусная жизнь каждые 3 волны
      if(gs.wave%3===0&&gs.lives<5){
        gs.lives=Math.min(5,gs.lives+1);
        gs.effects.push({x:W*0.5,y:H*0.38,text:'+❤️ Бонусная жизнь!',color:'#ff6666',vy:-0.5,a:1,size:12});
      }
    }

    const interval=Math.max(28,diff.spawnBase-gs.wave*3);
    if(gs.frame%interval===0)spawnFood();

    const fatW=(8+(gs.fat/100)*9)*PX;
    const catchY=p.y-24;
    gs.foods=gs.foods.filter(f=>{
      f.y+=f.speed;
      f.x+=Math.sin(gs.frame*f.wobbleSpeed+f.wobble)*0.4;
      if(gs.magnet>0&&!f.isJunk&&!f.isPowerup){
        const dx=p.x-f.x,dy=catchY-f.y,dist=Math.sqrt(dx*dx+dy*dy);
        if(dist<W*0.23){f.x+=dx*0.08;f.y+=dy*0.06;}
      }
      // Коллизия
      if(Math.abs(f.x-p.x)<fatW+f.size*0.42&&Math.abs(f.y-catchY)<f.size*0.92){
        if(f.isPowerup){
          if(f.type==='magnet')gs.magnet=f.dur;
          if(f.type==='shield')gs.shield=f.dur;
          if(f.type==='double')gs.double=f.dur;
          if(f.type==='pill'){gs.fat=Math.max(5,gs.fat-20);gs.effects.push({x:f.x,y:f.y-20,text:'-20% веса!',color:'#ff88ff',vy:-1,a:1,size:12});}
          if(f.type==='life'&&gs.lives<5){gs.lives++;gs.effects.push({x:f.x,y:f.y-20,text:'+❤️',color:'#ff6666',vy:-1,a:1,size:14});}
          spawnParticles(f.x,f.y,'#aaddff',10);gs.flashColor='#002244';gs.flashA=0.16;
        } else if(!f.isJunk){
          const multi=gs.double>0?2:1;
          const comboBon=gs.combo>2?Math.min(gs.combo,8):1;
          const pts=(f.pts||10)*comboBon*multi*(f.rare?2:1);
          gs.score+=pts;gs.combo++;
          if(gs.combo>gs.maxCombo)gs.maxCombo=gs.combo;
          gs.fat=Math.max(5,gs.fat-(gs.detoxRound?8:4));
          if(gs.combo%5===0){
            gs.fat=Math.max(5,gs.fat-5);
            gs.effects.push({x:f.x,y:f.y-32,text:'💪 КОМБО БОНУС!',color:'#88ffaa',vy:-0.8,a:1,size:12});
          }
          const label=f.rare?'★ РЕДКОСТЬ! +'+pts:'+'+pts+(gs.combo>1?' x'+gs.combo:'');
          gs.effects.push({x:f.x,y:f.y-20,text:label,color:f.rare?'#ffee00':'#44ff88',vy:-1.2,a:1,size:f.rare?14:12});
          spawnParticles(f.x,f.y,f.rare?'#ffee00':'#44ff44',f.rare?12:7);
          gs.flashColor='#002200';gs.flashA=0.14;
        } else {
          if(gs.shield>0){gs.shield=0;gs.effects.push({x:f.x,y:f.y-20,text:'🛡️ Заблокировано!',color:'#aaaaff',vy:-1,a:1,size:12});}
          else{
            const diff2=DIFFICULTY[S.diff];
            gs.fat=Math.min(100,gs.fat+f.fat*diff2.fatMult);gs.combo=0;
            gs.effects.push({x:f.x,y:f.y-20,text:'+вес!',color:'#ff4444',vy:-1.2,a:1,size:13});
            spawnParticles(f.x,f.y,'#ff4444',8);gs.flashColor='#440000';gs.flashA=0.28;
            if(gs.fat>=100){gs.over=true;SCREEN='over';}
          }
        }
        return false;
      }
      if(f.y>H+20){
        if(!f.isJunk&&!f.isPowerup&&gs.frame>GRACE){
          gs.lives--;gs.combo=0;
          gs.effects.push({x:f.x,y:H-60,text:'Мимо!',color:'#ff8888',vy:-0.8,a:1,size:13});
          gs.flashColor='#220000';gs.flashA=0.25;
          if(gs.lives<=0){gs.over=true;SCREEN='over';}
        }
        return false;
      }
      return true;
    });
    if(gs.score>S.highScore){S.highScore=gs.score;STORE.set('highScore',gs.score);}
  }

  gs.foods.forEach(f=>drawFood(ctx,f));
  gs.particles=gs.particles.filter(p=>{
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.12;p.life-=0.04;
    ctx.fillStyle=p.color+Math.round(p.life*255).toString(16).padStart(2,'0');
    ctx.fillRect(Math.round(p.x),Math.round(p.y),p.size,p.size);return p.life>0;
  });

  const{player:pl,magnet:mg,shield:sh,double:db}=gs;
  drawPlayerAt(ctx,pl.x,pl.y,gs.fat,gender,skin,gs.frame,pl.moveL,pl.moveR,sh,mg,W,db);
  if(SCREEN==='game')drawHUD(ctx,gs);

  gs.effects=gs.effects.filter(e=>{
    ctx.globalAlpha=e.a;ctx.fillStyle=e.color;ctx.font=`bold ${e.size||12}px monospace`;ctx.textAlign='center';
    ctx.fillText(e.text,e.x,e.y);ctx.globalAlpha=1;e.y+=e.vy;e.a-=0.02;return e.a>0;
  });
  if(gs.flashA>0){ctx.fillStyle=gs.flashColor;ctx.globalAlpha=gs.flashA;ctx.fillRect(0,0,W,H);ctx.globalAlpha=1;gs.flashA=Math.max(0,gs.flashA-0.04);}
  if(SCREEN==='over')drawOver(ctx,gs);
}

const _origST=switchTab;
switchTab=function(tab){_origST(tab);if(tab==='game')setTimeout(initGame,50);};
</script>
