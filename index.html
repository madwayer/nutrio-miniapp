<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NutriO</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap');

  :root {
    --bg: #0f0f13;
    --surface: #1a1a22;
    --surface2: #22222e;
    --accent: #6c63ff;
    --accent2: #ff6584;
    --green: #43e97b;
    --text: #f0f0f5;
    --text2: #8888aa;
    --radius: 16px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Manrope', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  .header {
    padding: 16px 20px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .logo {
    font-size: 22px;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -0.5px;
  }
  .header-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }

  /* TABS */
  .tabs {
    display: flex;
    padding: 12px 20px 0;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    border: none;
    transition: all 0.2s;
    background: var(--surface);
    color: var(--text2);
  }
  .tab.active {
    background: var(--accent);
    color: white;
  }

  /* CONTENT */
  .content { padding: 16px 20px; }
  .page { display: none; }
  .page.active { display: block; }

  /* SCANNER PAGE */
  .scanner-hero {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 32px 20px;
    text-align: center;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }
  .scanner-hero::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 150px; height: 150px;
    background: radial-gradient(circle, rgba(108,99,255,0.3), transparent 70%);
    border-radius: 50%;
  }
  .scanner-icon {
    font-size: 56px;
    margin-bottom: 12px;
    display: block;
  }
  .scanner-hero h2 {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .scanner-hero p {
    font-size: 14px;
    color: var(--text2);
    line-height: 1.5;
  }

  #video-container {
    position: relative;
    border-radius: var(--radius);
    overflow: visible;
    margin-bottom: 16px;
    background: #000;
    display: none;
    min-height: 300px;
    width: 100%;
  }
  /* html5-qrcode вставляет свои элементы — убираем лишние стили */
  #video-container video {
    width: 100% !important;
    border-radius: var(--radius);
  }
  #video-container canvas {
    display: none !important;
  }
  #scanner-video {
    width: 100%;
    display: block;
    border-radius: var(--radius);
  }
  .scan-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .scan-frame {
    width: 220px;
    height: 140px;
    border: 2px solid var(--accent);
    border-radius: 12px;
    box-shadow: 0 0 0 2000px rgba(0,0,0,0.5);
    position: relative;
  }
  .scan-line {
    position: absolute;
    left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    animation: scanline 2s ease-in-out infinite;
  }
  @keyframes scanline {
    0% { top: 0; }
    100% { top: 100%; }
  }

  /* BUTTONS */
  .btn {
    width: 100%;
    padding: 14px;
    border-radius: var(--radius);
    border: none;
    font-family: 'Manrope', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #8b7eff);
    color: white;
  }
  .btn-primary:active { transform: scale(0.97); }
  .btn-secondary {
    background: var(--surface2);
    color: var(--text);
    margin-top: 10px;
  }
  .btn-danger {
    background: rgba(255,101,132,0.15);
    color: var(--accent2);
    margin-top: 10px;
  }

  /* PRODUCT CARD */
  .product-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 16px;
    display: none;
    border: 1px solid rgba(108,99,255,0.3);
  }
  .product-card.show { display: block; }
  .product-name {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 12px;
  }
  .macros-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 16px;
  }
  .macro-item {
    background: var(--surface2);
    border-radius: 10px;
    padding: 10px 6px;
    text-align: center;
  }
  .macro-value {
    font-size: 16px;
    font-weight: 800;
  }
  .macro-label {
    font-size: 10px;
    color: var(--text2);
    margin-top: 2px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .macro-item.cal .macro-value { color: #ff9f43; }
  .macro-item.prot .macro-value { color: #48dbfb; }
  .macro-item.fat .macro-value { color: #ff9ff3; }
  .macro-item.carb .macro-value { color: #54a0ff; }

  .weight-input-block { margin-bottom: 12px; }
  .weight-input-block label {
    font-size: 13px;
    color: var(--text2);
    display: block;
    margin-bottom: 6px;
  }
  .weight-row { display: flex; gap: 8px; }
  .weight-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 12px 14px;
    font-family: 'Manrope', sans-serif;
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    outline: none;
  }
  .weight-input:focus { border-color: var(--accent); }
  .weight-btn {
    background: var(--surface2);
    border: none;
    border-radius: 10px;
    padding: 12px 14px;
    color: var(--text);
    font-size: 18px;
    cursor: pointer;
  }

  .meal-select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 12px 14px;
    font-family: 'Manrope', sans-serif;
    font-size: 14px;
    color: var(--text);
    outline: none;
    margin-bottom: 12px;
    appearance: none;
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--green);
    color: #0f0f13;
    padding: 12px 24px;
    border-radius: 30px;
    font-weight: 700;
    font-size: 14px;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 1000;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* MANUAL INPUT */
  .input-group { margin-bottom: 14px; }
  .input-group label {
    font-size: 13px;
    color: var(--text2);
    display: block;
    margin-bottom: 6px;
    font-weight: 600;
  }
  .text-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 12px 14px;
    font-family: 'Manrope', sans-serif;
    font-size: 15px;
    color: var(--text);
    outline: none;
  }
  .text-input:focus { border-color: var(--accent); }

  /* SECTION TITLE */
  .section-title {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text2);
    margin-bottom: 12px;
  }

  /* STATUS */
  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    margin-bottom: 12px;
  }
  .status-scanning {
    background: rgba(108,99,255,0.2);
    color: var(--accent);
  }
  .status-found {
    background: rgba(67,233,123,0.2);
    color: var(--green);
  }
  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: currentColor;
    animation: pulse 1s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="logo">NutriO</div>
    <div class="header-sub">Умный дневник питания</div>
  </div>
  <span style="font-size:28px">🥗</span>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('scanner')">📦 Штрихкод</button>
  <button class="tab" onclick="switchTab('manual')">✍️ Вручную</button>
  <button class="tab" onclick="switchTab('game')">🎮 Игра</button>
</div>

<div class="content">

  <!-- SCANNER PAGE -->
  <div class="page active" id="page-scanner">

    <div class="scanner-hero" id="scanner-hero">
      <span class="scanner-icon">📦</span>
      <h2>Сканер штрихкодов</h2>
      <p>Наведи камеру на штрихкод упаковки — бот найдёт КБЖУ автоматически</p>
    </div>

    <div id="status-area"></div>
    <div id="video-container">
      <video id="scanner-video" autoplay playsinline muted></video>
      <div class="scan-overlay">
        <div class="scan-frame">
          <div class="scan-line"></div>
        </div>
      </div>
    </div>

    <div class="product-card" id="product-card">
      <div class="product-name" id="product-name">—</div>
      <div class="macros-grid">
        <div class="macro-item cal">
          <div class="macro-value" id="m-cal">—</div>
          <div class="macro-label">ккал</div>
        </div>
        <div class="macro-item prot">
          <div class="macro-value" id="m-prot">—</div>
          <div class="macro-label">белки</div>
        </div>
        <div class="macro-item fat">
          <div class="macro-value" id="m-fat">—</div>
          <div class="macro-label">жиры</div>
        </div>
        <div class="macro-item carb">
          <div class="macro-value" id="m-carb">—</div>
          <div class="macro-label">углев.</div>
        </div>
      </div>
      <div class="weight-input-block">
        <label>Вес порции (граммы)</label>
        <div class="weight-row">
          <button class="weight-btn" onclick="adjustWeight(-10)">−</button>
          <input type="number" class="weight-input" id="weight-input" value="100" min="1" max="2000">
          <button class="weight-btn" onclick="adjustWeight(10)">+</button>
        </div>
      </div>
      <select class="meal-select" id="meal-select-scanner">
        <option value="завтрак">🌅 Завтрак</option>
        <option value="обед">☀️ Обед</option>
        <option value="ужин">🌙 Ужин</option>
        <option value="перекус">🍎 Перекус</option>
      </select>
      <button class="btn btn-primary" onclick="saveProduct()">✅ Записать в дневник</button>
      <button class="btn btn-danger" onclick="resetScanner()">🔄 Сканировать снова</button>
    </div>

    <button class="btn btn-primary" id="scan-btn" onclick="startScanner()">
      📷 Открыть камеру
    </button>
    <button class="btn btn-secondary" id="stop-btn" onclick="stopScanner()" style="display:none">
      ⏹ Остановить
    </button>

  </div>

  <!-- MANUAL PAGE -->
  <div class="page" id="page-manual">
    <div class="section-title">Добавить вручную</div>
    <div class="input-group">
      <label>Название продукта</label>
      <input type="text" class="text-input" id="manual-name" placeholder="Например: Курица">
    </div>
    <div class="input-group">
      <label>Вес (г)</label>
      <input type="number" class="text-input" id="manual-weight" placeholder="200">
    </div>
    <div class="input-group">
      <label>Приём пищи</label>
      <select class="meal-select" id="meal-select-manual">
        <option value="завтрак">🌅 Завтрак</option>
        <option value="обед">☀️ Обед</option>
        <option value="ужин">🌙 Ужин</option>
        <option value="перекус">🍎 Перекус</option>
      </select>
    </div>
    <button class="btn btn-primary" onclick="sendManual()">✅ Добавить</button>
  </div>


  <!-- GAME PAGE -->
  <div class="page" id="page-game">
    <div style="text-align:center; margin-bottom:8px;">
      <span id="game-score-display" style="font-size:15px; font-weight:700; color:var(--text2);">Очки: 0</span>
      &nbsp;&nbsp;
      <span id="game-fat-display" style="font-size:13px; color:var(--text2);">⚖️ 50%</span>
    </div>
    <canvas id="gameCanvas" style="display:block; margin:0 auto; border-radius:12px; touch-action:none;"></canvas>
    <div id="game-controls" style="display:flex; gap:8px; margin-top:10px;">
      <button class="btn btn-secondary" id="btn-left" style="flex:1; padding:18px; font-size:24px; user-select:none;">👈</button>
      <button class="btn btn-secondary" id="btn-right" style="flex:1; padding:18px; font-size:24px; user-select:none;">👉</button>
    </div>
    <p style="text-align:center; font-size:11px; color:var(--text2); margin-top:6px;">Лови 🥦🍎🥕 — худеешь | Избегай 🍕🍔🧁 — толстеешь</p>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

let currentProduct = null;
let stream = null;
let detecting = false;
let animFrame = null;

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('page-' + tab).classList.add('active');
  if (tab !== 'scanner') stopScanner();
}

function showToast(msg, color) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = color || 'var(--green)';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function setStatus(type, text) {
  const area = document.getElementById('status-area');
  if (!text) { area.innerHTML = ''; return; }
  area.innerHTML = `<div class="status-badge status-${type}"><div class="status-dot"></div>${text}</div>`;
}

async function startScanner() {
  if (!('BarcodeDetector' in window)) {
    showToast('Сканер не поддерживается на этом устройстве', 'var(--accent2)');
    return;
  }

  document.getElementById('scan-btn').style.display = 'none';
  document.getElementById('stop-btn').style.display = 'flex';
  document.getElementById('scanner-hero').style.display = 'none';
  document.getElementById('video-container').style.display = 'block';
  document.getElementById('product-card').classList.remove('show');
  setStatus('scanning', 'Ищу штрихкод...');
  detecting = true;

  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
    });

    const video = document.getElementById('scanner-video');
    video.style.display = 'block';
    video.srcObject = stream;
    await video.play();

    const detector = new BarcodeDetector({
      formats: ['ean_13', 'ean_8', 'upc_a', 'upc_e', 'code_128']
    });

    const scan = async () => {
      if (!detecting) return;
      try {
        if (video.readyState >= 2) {
          const barcodes = await detector.detect(video);
          if (barcodes.length > 0) {
            const code = barcodes[0].rawValue;
            detecting = false;
            stopScanner();
            setStatus('scanning', `Штрихкод: ${code} — ищу...`);
            await lookupBarcode(code);
            return;
          }
        }
      } catch(e) {}
      animFrame = setTimeout(scan, 150);
    };

    const startDetecting = () => {
      if (video.readyState >= 2 && video.currentTime > 0) {
        animFrame = requestAnimationFrame(scan);
      } else {
        setTimeout(startDetecting, 100);
      }
    };
    video.addEventListener('playing', startDetecting, { once: true });
    // На случай если 'playing' уже было
    if (!video.paused) startDetecting();

  } catch(e) {
    showToast('Нет доступа к камере', 'var(--accent2)');
    resetScanner();
  }
}

function stopScanner() {
  detecting = false;
  if (animFrame) { clearTimeout(animFrame); animFrame = null; }
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  const video = document.getElementById('scanner-video');
  video.srcObject = null;
  document.getElementById('video-container').style.display = 'none';
  document.getElementById('scan-btn').style.display = 'flex';
  document.getElementById('stop-btn').style.display = 'none';
  document.getElementById('scanner-hero').style.display = 'block';
  setStatus(null);
}

async function lookupBarcode(code) {
  setStatus('scanning', `🔍 Ищу в базах данных...`);

  let product = await tryOpenFoodFacts(code);
  if (!product) product = await tryUPCItemDB(code);

  if (!product) {
    setStatus('scanning', `Штрихкод ${code} не найден 😔`);
    document.getElementById('scan-btn').style.display = 'flex';
    document.getElementById('stop-btn').style.display = 'none';
    return;
  }

  currentProduct = product;
  document.getElementById('product-name').textContent = currentProduct.name;
  document.getElementById('m-cal').textContent = currentProduct.cal;
  document.getElementById('m-prot').textContent = currentProduct.prot;
  document.getElementById('m-fat').textContent = currentProduct.fat;
  document.getElementById('m-carb').textContent = currentProduct.carb;
  document.getElementById('product-card').classList.add('show');
  document.getElementById('video-container').style.display = 'none';
  document.getElementById('stop-btn').style.display = 'none';
  setStatus('found', `Найдено: ${currentProduct.name}`);
}

function parseOFFProduct(data) {
  if (data.status !== 1) return null;
  const p = data.product;
  const n = p.nutriments || {};
  const name = p.product_name_ru || p.product_name_en || p.product_name || '';
  if (!name) return null;
  let cal = n['energy-kcal_100g'] || (n['energy_100g'] ? n['energy_100g'] / 4.184 : 0);
  return {
    name: name.trim(),
    cal: Math.round(cal),
    prot: Math.round((n['proteins_100g'] || 0) * 10) / 10,
    fat: Math.round((n['fat_100g'] || 0) * 10) / 10,
    carb: Math.round((n['carbohydrates_100g'] || 0) * 10) / 10,
  };
}

async function tryOpenFoodFacts(code) {
  // Сначала русский сервер — больше РФ/СНГ продуктов
  const urls = [
    `https://ru.openfoodfacts.org/api/v0/product/${code}.json`,
    `https://world.openfoodfacts.org/api/v0/product/${code}.json`,
  ];
  for (const url of urls) {
    try {
      const res = await fetch(url);
      const data = await res.json();
      const product = parseOFFProduct(data);
      if (product) return product;
    } catch(e) {}
  }
  return null;
}

async function tryUPCItemDB(code) {
  try {
    const res = await fetch(`https://api.upcitemdb.com/prod/trial/lookup?upc=${code}`);
    const data = await res.json();
    if (data.code !== 'OK' || !data.items?.length) return null;
    const item = data.items[0];
    const name = item.title || item.brand || '';
    if (!name) return null;
    // UPCItemDB не всегда даёт КБЖУ — ставим 0, юзер сам введёт
    const n = item.nutrition || {};
    return {
      name: name.trim(),
      cal: Math.round(n.calories || 0),
      prot: Math.round((n.protein || 0) * 10) / 10,
      fat: Math.round((n.fat || 0) * 10) / 10,
      carb: Math.round((n.carbohydrate || 0) * 10) / 10,
    };
  } catch(e) { return null; }
}

function adjustWeight(delta) {
  const inp = document.getElementById('weight-input');
  inp.value = Math.max(1, parseInt(inp.value || 100) + delta);
}

function saveProduct() {
  if (!currentProduct) return;
  const weight = parseInt(document.getElementById('weight-input').value) || 100;
  const meal = document.getElementById('meal-select-scanner').value;
  const ratio = weight / 100;

  // Если КБЖУ известно — сохраняем напрямую, иначе отдаём боту на расчёт через AI
  const hasNutrition = currentProduct.cal > 0;
  const data = hasNutrition ? {
    action: 'add_food',
    food_name: currentProduct.name,
    meal_type: meal,
    weight: weight,
    calories: Math.round(currentProduct.cal * ratio * 10) / 10,
    protein: Math.round(currentProduct.prot * ratio * 10) / 10,
    fat: Math.round(currentProduct.fat * ratio * 10) / 10,
    carbs: Math.round(currentProduct.carb * ratio * 10) / 10,
  } : {
    action: 'add_manual',
    food_name: currentProduct.name,
    meal_type: meal,
    weight: weight,
  };

  try {
    if (tg && tg.sendData) {
      tg.sendData(JSON.stringify(data));
    } else {
      showToast(`✅ ${currentProduct.name} ${weight}г записан!`);
    }
  } catch(e) {
    showToast('Ошибка отправки: ' + e.message, 'var(--accent2)');
  }
}

function resetScanner() {
  currentProduct = null;
  document.getElementById('product-card').classList.remove('show');
  startScanner();
}

function sendManual() {
  const name = document.getElementById('manual-name').value.trim();
  const weight = document.getElementById('manual-weight').value;
  const meal = document.getElementById('meal-select-manual').value;
  if (!name || !weight) { showToast('Заполни название и вес', 'var(--accent2)'); return; }
  const data = { action: 'add_manual', food_name: name, meal_type: meal, weight: parseInt(weight) };
  if (tg) { tg.sendData(JSON.stringify(data)); }
  else { showToast(`✅ ${name} ${weight}г добавлен!`); }
}
// ===== GAME =====
let gameState = null;

function initGame() {
  const canvas = document.getElementById('gameCanvas');
  if (!canvas) return;
  const container = canvas.parentElement;
  const W = Math.min(container.clientWidth - 0, 420);
  const H = Math.min(window.innerHeight * 0.52, 380);
  canvas.width = W;
  canvas.height = H;

  const HEALTHY = ['🥦','🍎','🥕','🥒','🫐','🍋','🥑','🍓'];
  const JUNK    = ['🍕','🍔','🧁','🍰','🍫','🍟','🌮','🥐'];

  gameState = {
    canvas, ctx: canvas.getContext('2d'),
    W, H,
    score: 0, frame: 0, over: false, started: false,
    player: { x: W/2, fat: 50, speed: W*0.018 },
    foods: [], effects: [],
    moveL: false, moveR: false,
    raf: null,
  };

  const gs = gameState;

  // Controls
  const btnL = document.getElementById('btn-left');
  const btnR = document.getElementById('btn-right');
  const setL = v => gs.moveL = v;
  const setR = v => gs.moveR = v;
  btnL.addEventListener('touchstart', e => { e.preventDefault(); setL(true); }, {passive:false});
  btnL.addEventListener('touchend',   e => { e.preventDefault(); setL(false); }, {passive:false});
  btnR.addEventListener('touchstart', e => { e.preventDefault(); setR(true); }, {passive:false});
  btnR.addEventListener('touchend',   e => { e.preventDefault(); setR(false); }, {passive:false});
  btnL.addEventListener('mousedown',  () => setL(true));
  btnL.addEventListener('mouseup',    () => setL(false));
  btnR.addEventListener('mousedown',  () => setR(true));
  btnR.addEventListener('mouseup',    () => setR(false));
  document.addEventListener('keydown', e => { if(e.key==='ArrowLeft') setL(true); if(e.key==='ArrowRight') setR(true); });
  document.addEventListener('keyup',   e => { if(e.key==='ArrowLeft') setL(false); if(e.key==='ArrowRight') setR(false); });

  canvas.addEventListener('click', () => {
    if (!gs.started) { gs.started = true; return; }
    if (gs.over) restartGame();
  });

  function spawnFood() {
    const isJunk = Math.random() < 0.45;
    const list = isJunk ? JUNK : HEALTHY;
    const emoji = list[Math.floor(Math.random() * list.length)];
    gs.foods.push({
      x: Math.random() * (W - 48) + 24,
      y: -24, size: 26,
      speed: (2.2 + Math.random()*1.8 + gs.score/400) * (H/380),
      emoji, isJunk,
    });
  }

  function drawPlayer() {
    const ctx = gs.ctx;
    const p = gs.player;
    const fat = p.fat / 100;
    const bw = W*0.09 + fat * W*0.13;
    const bh = H*0.10 + fat * H*0.06;
    const py = H - 55;

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.beginPath();
    ctx.ellipse(p.x, py + bh/2 + 2, bw*0.6, 6, 0, 0, Math.PI*2);
    ctx.fill();

    // Body gradient
    const r = Math.round(80 + fat*160);
    const g = Math.round(200 - fat*150);
    const grad = ctx.createRadialGradient(p.x-bw*0.1, py-bh*0.1, 2, p.x, py, bw);
    grad.addColorStop(0, `rgb(${r+40},${g+40},120)`);
    grad.addColorStop(1, `rgb(${r},${g},80)`);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.ellipse(p.x, py, bw, bh, 0, 0, Math.PI*2);
    ctx.fill();

    // Head
    const headR = W*0.052;
    const hy = py - bh - headR*0.6;
    ctx.fillStyle = '#FFD166';
    ctx.beginPath();
    ctx.arc(p.x, hy, headR, 0, Math.PI*2);
    ctx.fill();

    // Eyes
    ctx.fillStyle = '#333';
    ctx.beginPath();
    ctx.arc(p.x - headR*0.35, hy - headR*0.1, headR*0.12, 0, Math.PI*2);
    ctx.arc(p.x + headR*0.35, hy - headR*0.1, headR*0.12, 0, Math.PI*2);
    ctx.fill();

    // Mouth
    ctx.strokeStyle = '#333'; ctx.lineWidth = 1.5;
    ctx.beginPath();
    if (fat < 0.65) {
      ctx.arc(p.x, hy + headR*0.2, headR*0.28, 0.1, Math.PI-0.1);
    } else {
      ctx.arc(p.x, hy + headR*0.45, headR*0.28, Math.PI+0.1, 2*Math.PI-0.1);
    }
    ctx.stroke();

    // Legs
    const legW = Math.max(4, bw*0.18);
    ctx.strokeStyle = `rgb(${r},${g},80)`;
    ctx.lineWidth = legW; ctx.lineCap = 'round';
    const legY = py + bh - 4;
    const wobble = Math.sin(gs.frame * 0.25) * 4 * (gs.moveL || gs.moveR ? 1 : 0);
    ctx.beginPath();
    ctx.moveTo(p.x - bw*0.28, legY);
    ctx.lineTo(p.x - bw*0.28 + wobble, legY + H*0.055);
    ctx.moveTo(p.x + bw*0.28, legY);
    ctx.lineTo(p.x + bw*0.28 - wobble, legY + H*0.055);
    ctx.stroke();

    // Arms
    ctx.lineWidth = legW * 0.8;
    ctx.beginPath();
    ctx.moveTo(p.x - bw*0.85, py - bh*0.1);
    ctx.lineTo(p.x - bw - wobble, py + bh*0.2);
    ctx.moveTo(p.x + bw*0.85, py - bh*0.1);
    ctx.lineTo(p.x + bw + wobble, py + bh*0.2);
    ctx.stroke();
  }

  function loop() {
    const ctx = gs.ctx;
    gs.raf = requestAnimationFrame(loop);

    // BG
    ctx.fillStyle = '#0f0f13';
    ctx.fillRect(0, 0, W, H);

    // Ground
    ctx.fillStyle = '#1a1a22';
    ctx.fillRect(0, H-32, W, 32);
    ctx.fillStyle = '#22222e';
    ctx.fillRect(0, H-34, W, 4);

    if (!gs.started) {
      ctx.fillStyle = 'rgba(108,99,255,0.15)';
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#f0f0f5';
      ctx.font = `bold ${W*0.065}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillText('🎮 NutriO Runner', W/2, H*0.38);
      ctx.font = `${W*0.042}px sans-serif`;
      ctx.fillStyle = '#8888aa';
      ctx.fillText('Лови здоровую еду!', W/2, H*0.5);
      ctx.fillStyle = '#6c63ff';
      ctx.beginPath();
      ctx.roundRect(W/2-70, H*0.6, 140, 44, 12);
      ctx.fill();
      ctx.fillStyle = 'white';
      ctx.font = `bold ${W*0.042}px sans-serif`;
      ctx.fillText('▶  Начать', W/2, H*0.6+28);
      drawPlayer();
      return;
    }

    if (!gs.over) {
      gs.frame++;
      const p = gs.player;
      const fatW = W*0.09 + (p.fat/100)*W*0.13;

      // Move
      if (gs.moveL) p.x = Math.max(fatW, p.x - p.speed);
      if (gs.moveR) p.x = Math.min(W - fatW, p.x + p.speed);

      // Spawn
      const interval = Math.max(28, 55 - gs.score/8);
      if (gs.frame % Math.round(interval) === 0) spawnFood();

      // Update foods
      const py = H - 55;
      const fatH = H*0.10 + (p.fat/100)*H*0.06;
      gs.foods = gs.foods.filter(f => {
        f.y += f.speed;
        const dx = Math.abs(f.x - p.x);
        const dy = Math.abs(f.y - py);
        if (dx < fatW + 14 && dy < fatH + 14) {
          if (!f.isJunk) {
            gs.score += 10 + Math.floor(gs.score/50);
            p.fat = Math.max(5, p.fat - 6);
            gs.effects.push({x:f.x, y:f.y, text:'+'+( 10+Math.floor(gs.score/50)), color:'#43e97b', vy:-1.5, a:1});
          } else {
            p.fat = Math.min(100, p.fat + 12);
            gs.effects.push({x:f.x, y:f.y, text:'😬', color:'#ff6584', vy:-1.5, a:1});
            if (p.fat >= 100) gs.over = true;
          }
          return false;
        }
        return f.y < H + 30;
      });
    }

    // Draw foods
    gs.foods.forEach(f => {
      gs.ctx.font = `${f.size}px serif`;
      gs.ctx.textAlign = 'center';
      gs.ctx.fillText(f.emoji, f.x, f.y);
    });

    drawPlayer();

    // Effects
    gs.effects = gs.effects.filter(e => {
      ctx.globalAlpha = e.a;
      ctx.fillStyle = e.color;
      ctx.font = `bold ${W*0.05}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillText(e.text, e.x, e.y);
      ctx.globalAlpha = 1;
      e.y += e.vy; e.a -= 0.025;
      return e.a > 0;
    });

    // HUD
    ctx.fillStyle = 'rgba(15,15,19,0.7)';
    ctx.fillRect(0, 0, W, 36);
    ctx.fillStyle = '#f0f0f5';
    ctx.font = `bold ${W*0.042}px sans-serif`;
    ctx.textAlign = 'left';
    ctx.fillText('⭐ ' + gs.score, 10, 24);

    // Fat bar
    const barW = W*0.28;
    ctx.fillStyle = '#22222e';
    ctx.beginPath(); ctx.roundRect(W - barW - 10, 8, barW, 18, 6); ctx.fill();
    const fatPct = gs.player.fat / 100;
    const barColor = fatPct < 0.5 ? '#43e97b' : fatPct < 0.8 ? '#ffa500' : '#ff4444';
    ctx.fillStyle = barColor;
    ctx.beginPath(); ctx.roundRect(W - barW - 10, 8, barW * fatPct, 18, 6); ctx.fill();
    ctx.fillStyle = '#f0f0f5';
    ctx.font = `${W*0.033}px sans-serif`;
    ctx.textAlign = 'right';
    ctx.fillText('⚖️ ' + Math.round(gs.player.fat) + '%', W - 8, 22);

    // Update external displays
    document.getElementById('game-score-display').textContent = 'Очки: ' + gs.score;
    document.getElementById('game-fat-display').textContent = '⚖️ ' + Math.round(gs.player.fat) + '%';

    // Game over
    if (gs.over) {
      ctx.fillStyle = 'rgba(0,0,0,0.75)';
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#ff6584';
      ctx.font = `bold ${W*0.09}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillText('😱 Объелся!', W/2, H*0.38);
      ctx.fillStyle = '#f0f0f5';
      ctx.font = `${W*0.052}px sans-serif`;
      ctx.fillText('Очки: ' + gs.score, W/2, H*0.52);
      ctx.fillStyle = '#6c63ff';
      ctx.beginPath(); ctx.roundRect(W/2-80, H*0.62, 160, 48, 12); ctx.fill();
      ctx.fillStyle = 'white';
      ctx.font = `bold ${W*0.042}px sans-serif`;
      ctx.fillText('🔄 Снова', W/2, H*0.62+31);
    }
  }

  if (gs.raf) cancelAnimationFrame(gs.raf);
  loop();
}

function restartGame() {
  if (!gameState) return;
  const gs = gameState;
  gs.score = 0; gs.frame = 0; gs.over = false;
  gs.foods = []; gs.effects = [];
  gs.player = { x: gs.W/2, fat: 50, speed: gs.W*0.018 };
  gs.started = true;
}

// Patch switchTab to init game
const _origSwitchTab = switchTab;
switchTab = function(tab) {
  _origSwitchTab(tab);
  if (tab === 'game') setTimeout(initGame, 50);
};
