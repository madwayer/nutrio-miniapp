<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NutriO</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap');

  :root {
    --bg: #0f0f13;
    --surface: #1a1a22;
    --surface2: #22222e;
    --accent: #6c63ff;
    --accent2: #ff6584;
    --green: #43e97b;
    --text: #f0f0f5;
    --text2: #8888aa;
    --radius: 16px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Manrope', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  .header {
    padding: 16px 20px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .logo {
    font-size: 22px;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -0.5px;
  }
  .header-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }

  /* TABS */
  .tabs {
    display: flex;
    padding: 12px 20px 0;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    border: none;
    transition: all 0.2s;
    background: var(--surface);
    color: var(--text2);
  }
  .tab.active {
    background: var(--accent);
    color: white;
  }

  /* CONTENT */
  .content { padding: 16px 20px; }
  .page { display: none; }
  .page.active { display: block; }

  /* SCANNER PAGE */
  .scanner-hero {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 32px 20px;
    text-align: center;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }
  .scanner-hero::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 150px; height: 150px;
    background: radial-gradient(circle, rgba(108,99,255,0.3), transparent 70%);
    border-radius: 50%;
  }
  .scanner-icon {
    font-size: 56px;
    margin-bottom: 12px;
    display: block;
  }
  .scanner-hero h2 {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .scanner-hero p {
    font-size: 14px;
    color: var(--text2);
    line-height: 1.5;
  }

  #video-container {
    position: relative;
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 16px;
    background: #000;
    display: none;
  }
  #scanner-video {
    width: 100%;
    display: block;
    border-radius: var(--radius);
  }
  .scan-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .scan-frame {
    width: 220px;
    height: 140px;
    border: 2px solid var(--accent);
    border-radius: 12px;
    box-shadow: 0 0 0 2000px rgba(0,0,0,0.5);
    position: relative;
  }
  .scan-line {
    position: absolute;
    left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    animation: scanline 2s ease-in-out infinite;
  }
  @keyframes scanline {
    0% { top: 0; }
    100% { top: 100%; }
  }

  /* BUTTONS */
  .btn {
    width: 100%;
    padding: 14px;
    border-radius: var(--radius);
    border: none;
    font-family: 'Manrope', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #8b7eff);
    color: white;
  }
  .btn-primary:active { transform: scale(0.97); }
  .btn-secondary {
    background: var(--surface2);
    color: var(--text);
    margin-top: 10px;
  }
  .btn-danger {
    background: rgba(255,101,132,0.15);
    color: var(--accent2);
    margin-top: 10px;
  }

  /* PRODUCT CARD */
  .product-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 16px;
    display: none;
    border: 1px solid rgba(108,99,255,0.3);
  }
  .product-card.show { display: block; }
  .product-name {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 12px;
  }
  .macros-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 16px;
  }
  .macro-item {
    background: var(--surface2);
    border-radius: 10px;
    padding: 10px 6px;
    text-align: center;
  }
  .macro-value {
    font-size: 16px;
    font-weight: 800;
  }
  .macro-label {
    font-size: 10px;
    color: var(--text2);
    margin-top: 2px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .macro-item.cal .macro-value { color: #ff9f43; }
  .macro-item.prot .macro-value { color: #48dbfb; }
  .macro-item.fat .macro-value { color: #ff9ff3; }
  .macro-item.carb .macro-value { color: #54a0ff; }

  .weight-input-block { margin-bottom: 12px; }
  .weight-input-block label {
    font-size: 13px;
    color: var(--text2);
    display: block;
    margin-bottom: 6px;
  }
  .weight-row { display: flex; gap: 8px; }
  .weight-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 12px 14px;
    font-family: 'Manrope', sans-serif;
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    outline: none;
  }
  .weight-input:focus { border-color: var(--accent); }
  .weight-btn {
    background: var(--surface2);
    border: none;
    border-radius: 10px;
    padding: 12px 14px;
    color: var(--text);
    font-size: 18px;
    cursor: pointer;
  }

  .meal-select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 12px 14px;
    font-family: 'Manrope', sans-serif;
    font-size: 14px;
    color: var(--text);
    outline: none;
    margin-bottom: 12px;
    appearance: none;
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--green);
    color: #0f0f13;
    padding: 12px 24px;
    border-radius: 30px;
    font-weight: 700;
    font-size: 14px;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 1000;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* MANUAL INPUT */
  .input-group { margin-bottom: 14px; }
  .input-group label {
    font-size: 13px;
    color: var(--text2);
    display: block;
    margin-bottom: 6px;
    font-weight: 600;
  }
  .text-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 12px 14px;
    font-family: 'Manrope', sans-serif;
    font-size: 15px;
    color: var(--text);
    outline: none;
  }
  .text-input:focus { border-color: var(--accent); }

  /* SECTION TITLE */
  .section-title {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text2);
    margin-bottom: 12px;
  }

  /* STATUS */
  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    margin-bottom: 12px;
  }
  .status-scanning {
    background: rgba(108,99,255,0.2);
    color: var(--accent);
  }
  .status-found {
    background: rgba(67,233,123,0.2);
    color: var(--green);
  }
  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: currentColor;
    animation: pulse 1s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="logo">NutriO</div>
    <div class="header-sub">Умный дневник питания</div>
  </div>
  <span style="font-size:28px">🥗</span>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('scanner')">📦 Штрихкод</button>
  <button class="tab" onclick="switchTab('manual')">✍️ Вручную</button>
</div>

<div class="content">

  <!-- SCANNER PAGE -->
  <div class="page active" id="page-scanner">

    <div class="scanner-hero" id="scanner-hero">
      <span class="scanner-icon">📦</span>
      <h2>Сканер штрихкодов</h2>
      <p>Наведи камеру на штрихкод упаковки — бот найдёт КБЖУ автоматически</p>
    </div>

    <div id="status-area"></div>
    <div id="video-container">
      <video id="scanner-video" autoplay playsinline muted></video>
      <div class="scan-overlay">
        <div class="scan-frame">
          <div class="scan-line"></div>
        </div>
      </div>
    </div>

    <div class="product-card" id="product-card">
      <div class="product-name" id="product-name">—</div>
      <div class="macros-grid">
        <div class="macro-item cal">
          <div class="macro-value" id="m-cal">—</div>
          <div class="macro-label">ккал</div>
        </div>
        <div class="macro-item prot">
          <div class="macro-value" id="m-prot">—</div>
          <div class="macro-label">белки</div>
        </div>
        <div class="macro-item fat">
          <div class="macro-value" id="m-fat">—</div>
          <div class="macro-label">жиры</div>
        </div>
        <div class="macro-item carb">
          <div class="macro-value" id="m-carb">—</div>
          <div class="macro-label">углев.</div>
        </div>
      </div>
      <div class="weight-input-block">
        <label>Вес порции (граммы)</label>
        <div class="weight-row">
          <button class="weight-btn" onclick="adjustWeight(-10)">−</button>
          <input type="number" class="weight-input" id="weight-input" value="100" min="1" max="2000">
          <button class="weight-btn" onclick="adjustWeight(10)">+</button>
        </div>
      </div>
      <select class="meal-select" id="meal-select-scanner">
        <option value="завтрак">🌅 Завтрак</option>
        <option value="обед">☀️ Обед</option>
        <option value="ужин">🌙 Ужин</option>
        <option value="перекус">🍎 Перекус</option>
      </select>
      <button class="btn btn-primary" onclick="saveProduct()">✅ Записать в дневник</button>
      <button class="btn btn-danger" onclick="resetScanner()">🔄 Сканировать снова</button>
    </div>

    <button class="btn btn-primary" id="scan-btn" onclick="startScanner()">
      📷 Открыть камеру
    </button>
    <button class="btn btn-secondary" id="stop-btn" onclick="stopScanner()" style="display:none">
      ⏹ Остановить
    </button>

  </div>

  <!-- MANUAL PAGE -->
  <div class="page" id="page-manual">
    <div class="section-title">Добавить вручную</div>
    <div class="input-group">
      <label>Название продукта</label>
      <input type="text" class="text-input" id="manual-name" placeholder="Например: Курица">
    </div>
    <div class="input-group">
      <label>Вес (г)</label>
      <input type="number" class="text-input" id="manual-weight" placeholder="200">
    </div>
    <div class="input-group">
      <label>Приём пищи</label>
      <select class="meal-select" id="meal-select-manual">
        <option value="завтрак">🌅 Завтрак</option>
        <option value="обед">☀️ Обед</option>
        <option value="ужин">🌙 Ужин</option>
        <option value="перекус">🍎 Перекус</option>
      </select>
    </div>
    <button class="btn btn-primary" onclick="sendManual()">✅ Добавить</button>
  </div>

</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
<script>
const tg = window.Telegram?.WebApp;
if (tg) {
  tg.ready();
  tg.expand();
}

let currentProduct = null;
let scanning = false;

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('page-' + tab).classList.add('active');
  if (tab !== 'scanner') stopScanner();
}

function showToast(msg, color) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = color || 'var(--green)';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function setStatus(type, text) {
  const area = document.getElementById('status-area');
  if (!text) { area.innerHTML = ''; return; }
  area.innerHTML = `<div class="status-badge status-${type}"><div class="status-dot"></div>${text}</div>`;
}

async function startScanner() {
  document.getElementById('scan-btn').style.display = 'none';
  document.getElementById('stop-btn').style.display = 'flex';
  document.getElementById('scanner-hero').style.display = 'none';
  document.getElementById('video-container').style.display = 'block';
  document.getElementById('product-card').classList.remove('show');
  setStatus('scanning', 'Ищу штрихкод...');
  scanning = true;

  Quagga.init({
    inputStream: {
      type: 'LiveStream',
      target: document.getElementById('video-container'),
      constraints: { facingMode: 'environment', width: 640, height: 480 }
    },
    decoder: { readers: ['ean_reader', 'ean_8_reader', 'code_128_reader', 'upc_reader'] },
    locate: true,
  }, err => {
    if (err) { showToast('Ошибка камеры', 'var(--accent2)'); return; }
    Quagga.start();
  });

  Quagga.onDetected(async result => {
    if (!scanning) return;
    const code = result.codeResult.code;
    if (!code) return;
    scanning = false;
    Quagga.stop();
    setStatus('scanning', `Штрихкод: ${code} — ищу...`);
    await lookupBarcode(code);
  });
}

  } catch (e) {
    showToast('Нет доступа к камере', 'var(--accent2)');
    resetScanner();
  }
}

function stopScanner() {
  scanning = false;
  try { Quagga.stop(); } catch(e) {}
  const video = document.getElementById('scanner-video');
  if (video.srcObject) {
    video.srcObject.getTracks().forEach(t => t.stop());
    video.srcObject = null;
  }
  document.getElementById('video-container').style.display = 'none';
  document.getElementById('scan-btn').style.display = 'flex';
  document.getElementById('stop-btn').style.display = 'none';
  document.getElementById('scanner-hero').style.display = 'block';
  setStatus(null);
}

async function lookupBarcode(code) {
  try {
    const res = await fetch(`https://world.openfoodfacts.org/api/v0/product/${code}.json`);
    const data = await res.json();

    if (data.status !== 1) {
      setStatus('scanning', `Штрихкод ${code} не найден 😔`);
      document.getElementById('scan-btn').style.display = 'flex';
      document.getElementById('stop-btn').style.display = 'none';
      return;
    }

    const p = data.product;
    const n = p.nutriments || {};
    const name = p.product_name_ru || p.product_name || 'Продукт';
    let cal = n['energy-kcal_100g'] || (n['energy_100g'] ? n['energy_100g'] / 4.184 : 0);

    currentProduct = {
      name: name.trim(),
      cal: Math.round(cal),
      prot: Math.round((n['proteins_100g'] || 0) * 10) / 10,
      fat: Math.round((n['fat_100g'] || 0) * 10) / 10,
      carb: Math.round((n['carbohydrates_100g'] || 0) * 10) / 10,
    };

    document.getElementById('product-name').textContent = currentProduct.name;
    document.getElementById('m-cal').textContent = currentProduct.cal;
    document.getElementById('m-prot').textContent = currentProduct.prot;
    document.getElementById('m-fat').textContent = currentProduct.fat;
    document.getElementById('m-carb').textContent = currentProduct.carb;
    document.getElementById('product-card').classList.add('show');
    document.getElementById('video-container').style.display = 'none';
    document.getElementById('stop-btn').style.display = 'none';
    setStatus('found', `Найдено: ${currentProduct.name}`);

  } catch(e) {
    setStatus('scanning', 'Ошибка поиска, попробуй снова');
    document.getElementById('scan-btn').style.display = 'flex';
  }
}

function adjustWeight(delta) {
  const inp = document.getElementById('weight-input');
  inp.value = Math.max(1, parseInt(inp.value || 100) + delta);
}

function saveProduct() {
  if (!currentProduct) return;
  const weight = parseInt(document.getElementById('weight-input').value) || 100;
  const meal = document.getElementById('meal-select-scanner').value;
  const ratio = weight / 100;

  const data = {
    action: 'add_food',
    food_name: currentProduct.name,
    meal_type: meal,
    weight: weight,
    calories: Math.round(currentProduct.cal * ratio * 10) / 10,
    protein: Math.round(currentProduct.prot * ratio * 10) / 10,
    fat: Math.round(currentProduct.fat * ratio * 10) / 10,
    carbs: Math.round(currentProduct.carb * ratio * 10) / 10,
  };

  if (tg) {
    tg.sendData(JSON.stringify(data));
  } else {
    showToast(`✅ ${currentProduct.name} ${weight}г записан!`);
  }
}

function resetScanner() {
  currentProduct = null;
  document.getElementById('product-card').classList.remove('show');
  document.getElementById('scanner-hero').style.display = 'block';
  document.getElementById('scan-btn').style.display = 'flex';
  setStatus(null);
}

function sendManual() {
  const name = document.getElementById('manual-name').value.trim();
  const weight = document.getElementById('manual-weight').value;
  const meal = document.getElementById('meal-select-manual').value;

  if (!name || !weight) {
    showToast('Заполни название и вес', 'var(--accent2)');
    return;
  }

  const data = { action: 'add_manual', food_name: name, meal_type: meal, weight: parseInt(weight) };

  if (tg) {
    tg.sendData(JSON.stringify(data));
  } else {
    showToast(`✅ ${name} ${weight}г добавлен!`);
  }
}
</script>
</body>
</html>
